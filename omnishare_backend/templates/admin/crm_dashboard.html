{% extends "admin/base_site.html" %}
{% block title %}Graphical CRM Dashboard{% endblock %}
{% block extrastyle %}
{{ block.super }}
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
    /* Reset django admin styles that break layout */
    #content {
        padding: 0 !important;
    }
</style>
<script>
  tailwind.config = { darkMode: ['class', '[data-theme="dark"]'] }
</script>
{% endblock %}
{% block content %}
<div class="bg-slate-50 dark:bg-slate-900 min-h-screen p-8 text-slate-900 dark:text-white font-sans" id="crm-app">
    <div class="max-w-7xl mx-auto space-y-8">
        <div class="flex justify-between items-center">
            <div>
                <h1
                    class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-emerald-400 to-cyan-400">
                    OmniShare CRM Analytics</h1>
                <p class="text-slate-600 dark:text-slate-400 mt-1">Real-time revenue & engagement metrics</p>
            </div>
            <button onclick="loadData()"
                class="px-5 py-2 bg-white shadow dark:bg-slate-800 dark:shadow-none hover:bg-slate-200 dark:hover:bg-slate-700 text-emerald-600 dark:text-emerald-400 font-semibold rounded-lg border border-emerald-500/30 transition-all shadow-[0_0_15px_rgba(16,185,129,0.15)]">Refresh
                Data</button>
        </div>

        <!-- KPIs -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6" id="kpi-grid">
            <div class="animate-pulse bg-white shadow dark:bg-slate-800 dark:shadow-none rounded-xl h-28 border border-slate-300 dark:border-slate-700"></div>
            <div class="animate-pulse bg-white shadow dark:bg-slate-800 dark:shadow-none rounded-xl h-28 border border-slate-300 dark:border-slate-700"></div>
            <div class="animate-pulse bg-white shadow dark:bg-slate-800 dark:shadow-none rounded-xl h-28 border border-slate-300 dark:border-slate-700"></div>
            <div class="animate-pulse bg-white shadow dark:bg-slate-800 dark:shadow-none rounded-xl h-28 border border-slate-300 dark:border-slate-700"></div>
        </div>

        <!-- Charts -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="bg-white shadow dark:bg-slate-800 dark:shadow-none p-6 rounded-xl border border-slate-300 dark:border-slate-700 shadow-xl">
                <h3 class="text-lg font-semibold text-slate-800 dark:text-slate-200 mb-4">Revenue Trend (30 Days)</h3>
                <canvas id="revenueChart" height="250"></canvas>
            </div>
            <div class="bg-white shadow dark:bg-slate-800 dark:shadow-none p-6 rounded-xl border border-slate-300 dark:border-slate-700 shadow-xl">
                <h3 class="text-lg font-semibold text-slate-800 dark:text-slate-200 mb-4">Category Distribution</h3>
                <canvas id="categoryChart" height="250"></canvas>
            </div>
        </div>

    </div>
</div>

<script>
    let revChartInstance = null;
    let catChartInstance = null;

    async function loadData() {
        try {
            const res = await fetch('/api/crm/dashboard/', { credentials: 'include' });
            const data = await res.json();

            // Fill KPIs
            document.getElementById('kpi-grid').innerHTML = `
      <div class="bg-white shadow dark:bg-slate-800 dark:shadow-none p-6 rounded-xl border border-emerald-200 dark:border-emerald-900/50 shadow-lg relative overflow-hidden">
        <div class="absolute -right-4 -top-4 w-24 h-24 bg-emerald-500/10 rounded-full blur-xl"></div>
        <p class="text-emerald-600 dark:text-emerald-400 text-sm font-bold tracking-wider uppercase mb-1">Total Users</p>
        <p class="text-3xl font-black text-slate-900 dark:text-white">${data.users?.total || 0}</p>
        <p class="text-xs text-slate-600 dark:text-slate-400 mt-2">${data.users?.verified || 0} verified</p>
      </div>
      <div class="bg-white shadow dark:bg-slate-800 dark:shadow-none p-6 rounded-xl border border-slate-300 dark:border-slate-700 shadow-lg">
        <p class="text-slate-600 dark:text-slate-400 text-sm font-bold tracking-wider uppercase mb-1">Active Listings</p>
        <p class="text-3xl font-black text-slate-900 dark:text-white">${data.listings?.active || 0}</p>
      </div>
      <div class="bg-white shadow dark:bg-slate-800 dark:shadow-none p-6 rounded-xl border border-slate-300 dark:border-slate-700 shadow-lg">
        <p class="text-slate-600 dark:text-slate-400 text-sm font-bold tracking-wider uppercase mb-1">Total Bookings</p>
        <p class="text-3xl font-black text-slate-900 dark:text-white">${data.bookings?.total || 0}</p>
        <p class="text-xs text-emerald-600 dark:text-emerald-400 mt-2">${data.bookings?.completed || 0} completed</p>
      </div>
      <div class="bg-white shadow dark:bg-slate-800 dark:shadow-none p-6 rounded-xl border border-cyan-200 dark:border-cyan-900/50 shadow-lg relative overflow-hidden">
        <div class="absolute -right-4 -top-4 w-24 h-24 bg-cyan-500/10 rounded-full blur-xl"></div>
        <p class="text-cyan-400 text-sm font-bold tracking-wider uppercase mb-1">Platform Revenue</p>
        <p class="text-3xl font-black text-slate-900 dark:text-white">₹${(data.revenue?.total_platform_revenue || 0).toLocaleString()}</p>
      </div>
    `;

            Chart.defaults.color = '#94a3b8';
            Chart.defaults.font.family = 'sans-serif';

            // Categories Chart
            const catCtx = document.getElementById('categoryChart').getContext('2d');
            if (catChartInstance) catChartInstance.destroy();
            catChartInstance = new Chart(catCtx, {
                type: 'doughnut',
                data: {
                    labels: (data.category_performance || []).slice(0, 5).map(c => c.category__name || 'Other'),
                    datasets: [{
                        data: (data.category_performance || []).slice(0, 5).map(c => c.total_bookings),
                        backgroundColor: ['#10b981', '#0ea5e9', '#8b5cf6', '#f43f5e', '#f59e0b'],
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, cutout: '75%', plugins: { legend: { position: 'right' } } }
            });

            // We fetch sales report for the revenue trend map
            const salesRes = await fetch('/api/crm/sales-report/', { credentials: 'include' });
            const salesData = await salesRes.json();

            const revCtx = document.getElementById('revenueChart').getContext('2d');
            if (revChartInstance) revChartInstance.destroy();

            const gradient = revCtx.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, 'rgba(16, 185, 129, 0.5)');
            gradient.addColorStop(1, 'rgba(16, 185, 129, 0.0)');

            revChartInstance = new Chart(revCtx, {
                type: 'line',
                data: {
                    labels: (salesData.timeline || []).map(t => t.label.split(' to ')[0]),
                    datasets: [{
                        label: 'Daily GMV (₹)',
                        data: (salesData.timeline || []).map(t => t.gmv),
                        borderColor: '#10b981',
                        backgroundColor: gradient,
                        borderWidth: 3,
                        tension: 0.4,
                        fill: true,
                        pointBackgroundColor: '#0f172a',
                        pointBorderColor: '#10b981',
                        pointBorderWidth: 2,
                        pointRadius: 4,
                        pointHoverRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } },
                        x: { grid: { display: false } }
                    },
                    plugins: { legend: { display: false } }
                }
            });

        } catch (e) {
            console.error(e);
        }
    }

    document.addEventListener('DOMContentLoaded', loadData);
</script>
{% endblock %}
